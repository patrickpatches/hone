name: EAS Android Build

on:
  workflow_dispatch:
    inputs:
      profile:
        description: 'Build profile'
        required: true
        default: 'preview'
        type: choice
        options:
          - preview
          - production

jobs:
  build:
    name: Build Android APK
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: mobile/package-lock.json

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install dependencies
        working-directory: mobile
        run: npm ci

      - name: Set up EAS CLI
        run: npm install -g eas-cli

      - name: Run expo prebuild
        working-directory: mobile
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        run: npx expo prebuild --platform android --clean --non-interactive

      - name: Build Android APK (local Gradle - full error output)
        working-directory: mobile/android
        run: |
          chmod +x gradlew
          ./gradlew assembleRelease --stacktrace 2>&1 | tee /tmp/gradle-output.txt
          echo "Exit code: $?"

      - name: Upload APK artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: hone-preview.apk
          path: mobile/android/app/build/outputs/apk/release/*.apk

      - name: Upload Gradle log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: gradle-failure-log
          path: /tmp/gradle-output.txt
